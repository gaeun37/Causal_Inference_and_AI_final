<path d="M510,143 Q435.0,250.0 440,397" fill="none" stroke="#868e96" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowd)"/>
<path d="M630,140 Q920.0,183.5 870,397" fill="none" stroke="#868e96" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowd)"/>

<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" font-family="'Noto Sans CJK KR','Segoe UI',sans-serif">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,8 L10,4 z" fill="#495057"/></marker><marker id="arrowd" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,8 L10,4 z" fill="#868e96"/></marker><marker id="arroww" markerWidth="13" markerHeight="13" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,8 L10,4 z" fill="#ffffff"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/></filter></defs>
<rect width="1040" height="600" fill="#fbfcfe"/>
<text x="520.0" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#212529" letter-spacing="0.3">인과 DAG — 시위 프레이밍 → 개선 vs 질서통제</text>
<text x="520.0" y="64" text-anchor="middle" font-size="13.5" fill="#868e96">실제 1912년 신문 OCR에서 읽은 두 경로; Z는 연구자가 추가한 혼란변수</text>
<path d="M480,143 Q240.0,170.0 180,287" fill="none" stroke="#868e96" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowd)"/>
<line x1="520" y1="143" x2="470" y2="177" stroke="#868e96" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowd)"/>
